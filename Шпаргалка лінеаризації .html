<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANSYS Mechanical: Шпаргалка лінеаризації напружень</title>
    <style>
        /* CSS Змінні для світлої та темної тем */
        :root {
            --bg-color: #F4F5F7;
            --container-bg: #FFFFFF;
            --text-main: #23282D;
            --text-muted: #6C7A89;
            --ansys-yellow: #FFB71B;
            --header-bg: #23282D;
            --header-text: #FFFFFF;
            --border-color: #D1D5DB;
            --toolbar-bg: #F9F9F9;
            --th-bg: #23282D;
            --th-text: #FFB71B;
            --row-alt: #FAFAFA;
            --row-hover: rgba(255, 183, 27, 0.08);
            --row-selected: rgba(255, 183, 27, 0.18);
            --input-bg: #FFFFFF;
            --input-border: #CCCCCC;
            --input-text: #23282D;
            --col-s-bg: #F0F3F5;
            --btn-clear: #E74C3C;
            --btn-clear-hover: #C0392B;
            --excel-blue: #6366f1;
            --excel-selected-bg: #e0e7ff;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --container-bg: #1E1E1E;
            --text-main: #E0E0E0;
            --text-muted: #A0A0A0;
            --ansys-yellow: #FFB71B;
            --header-bg: #181818;
            --header-text: #E0E0E0;
            --border-color: #444444;
            --toolbar-bg: #252525;
            --th-bg: #181818;
            --th-text: #FFB71B;
            --row-alt: #222222;
            --row-hover: rgba(255, 183, 27, 0.05);
            --row-selected: rgba(255, 183, 27, 0.14);
            --input-bg: #2D2D2D;
            --input-border: #555555;
            --input-text: #E0E0E0;
            --col-s-bg: #2A2D30;
            --btn-clear: #CF6679;
            --btn-clear-hover: #B35465;
            --excel-blue: #818cf8;
            --excel-selected-bg: rgba(99, 102, 241, 0.35);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            transition: background-color 0.3s, color 0.3s;
        }
        
        body.dragging-active {
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--container-bg);
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            height: 95vh;
        }

        .header {
            background-color: var(--header-bg);
            color: var(--header-text);
            padding: 12px 20px;
            border-bottom: 3px solid var(--ansys-yellow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .header-titles h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }
        .theme-toggle {
            background: transparent;
            color: var(--header-text);
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--ansys-yellow);
        }
        
        .toolbar {
            padding: 10px 20px;
            background-color: var(--toolbar-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        .btn {
            border: none;
            padding: 6px 12px;
            font-weight: bold;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background-color: var(--ansys-yellow); color: #23282D; }
        .btn-primary:hover { background-color: #E5A418; }
        .btn-danger { background-color: var(--btn-clear); color: white; }
        .btn-danger:hover { background-color: var(--btn-clear-hover); }
        .btn-secondary { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-secondary:hover { background-color: var(--row-hover); }

        .bulk-panel {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
            font-size: 12px;
        }
        .bulk-panel select {
            min-width: 170px;
            padding: 4px;
        }

        /* Таблиця */
        .table-container {
            flex-grow: 1;
            overflow-y: auto;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: Consolas, 'Courier New', monospace;
        }
        
        th, td {
            padding: 5px 6px;
            font-size: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
            vertical-align: middle;
        }
        
        thead th {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: var(--th-bg);
            color: var(--th-text);
            box-shadow: inset 0 -1px 0 var(--border-color);
            white-space: nowrap;
        }
        
        tbody tr {
            cursor: pointer;
            transition: background-color 0.15s ease;
        }
        tbody tr:nth-child(even) { background-color: var(--row-alt); }
        tbody tr:hover { background-color: var(--row-hover); }
        tbody tr.selected-row { background-color: var(--row-selected) !important; }
        
        /* Drag and Drop */
        .drag-handle {
            cursor: grab;
            color: var(--text-muted);
            font-size: 14px;
            user-select: none;
        }
        .drag-handle:active { cursor: grabbing; color: var(--text-main); }
        tr.dragging {
            opacity: 0.6;
            background-color: var(--row-selected) !important;
        }
        tr.drag-over-top { border-top: 2px solid var(--ansys-yellow); }
        tr.drag-over-bottom { border-bottom: 2px solid var(--ansys-yellow); }

        input[type="text"], select {
            width: 100%;
            padding: 4px 6px;
            font-size: 12px;
            border: 1px solid var(--input-border);
            border-radius: 3px;
            background-color: var(--input-bg);
            color: var(--input-text);
            font-family: inherit;
            box-sizing: border-box;
            text-align: center;
            text-align-last: center;
            transition: background-color 0.2s, border-left 0.2s;
        }
        input[type="text"] { cursor: text; }
        
        /* Розрахункові клітинки (колонки S1, S2, Srv) */
        .col-s {
            background-color: var(--col-s-bg);
            font-weight: bold;
            user-select: none;
            -webkit-user-select: none;
            cursor: cell; /* Курсор виділення як в Excel */
            position: relative;
        }

        /* Стиль Excel-style виділення клітинок */
        .col-s.cell-selected {
            background-color: var(--excel-selected-bg) !important;
            box-shadow: inset 0 0 0 1px var(--excel-blue) !important;
            color: var(--text-main) !important;
        }
        
        /* Кнопка копіювання */
        .copy-col-btn {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            color: var(--text-main);
            font-size: 11px;
            padding: 2px 5px;
            cursor: pointer;
            margin-left: 4px;
            transition: all 0.2s ease;
            vertical-align: middle;
        }
        .copy-col-btn:hover {
            background-color: var(--ansys-yellow);
            color: #23282D;
            border-color: var(--ansys-yellow);
        }
        
        .actions {
            display: flex;
            justify-content: center;
            gap: 4px;
        }
        .action-btn {
            background-color: transparent;
            border: none;
            color: var(--text-muted);
            padding: 3px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 3px;
            transition: all 0.2s;
        }
        .action-btn:hover { background-color: var(--input-bg); color: var(--text-main); }
        .action-btn.remove-btn:hover { color: var(--btn-clear); background-color: rgba(231, 76, 60, 0.1); }
        .action-btn.dup-btn:hover { color: var(--ansys-yellow); }
        
        input[type="checkbox"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
            accent-color: var(--ansys-yellow);
        }

        .tt { cursor: help; border-bottom: 1px dotted var(--text-muted); }
        sub, sup { font-size: 9px; }

        /* Порожній стан */
        .empty-state-row td {
            padding: 35px !important;
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            border: 1px dashed var(--border-color);
        }

        #toastNotification {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--ansys-yellow);
            color: #23282D;
            padding: 10px 20px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
            font-weight: bold;
            font-size: 13px;
            border-left: 4px solid #23282D;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

<div id="toastNotification"></div>

<!-- Безпечне кастомне модальне вікно для підтвердження видалення (замість confirm) -->
<div id="confirmModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center; font-family: 'Segoe UI', sans-serif;">
    <div style="background:var(--container-bg); color:var(--text-main); padding:20px; border-radius:6px; box-shadow:0 4px 15px rgba(0,0,0,0.3); text-align:center; max-width:320px; border:1px solid var(--border-color);">
        <p id="confirmMessage" style="margin-top:0; font-size:14px; font-weight:600; line-height:1.4;"></p>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:15px;">
            <button class="btn btn-danger" id="confirmYesBtn" style="padding:6px 16px;">Так</button>
            <button class="btn btn-secondary" id="confirmNoBtn" style="padding:6px 16px; border:1px solid var(--border-color);">Ні</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="header">
        <div class="header-titles">
            <h1>Шпаргалка лінеаризації (Path Results)</h1>
        </div>
        <button class="theme-toggle" id="themeBtn">🌙 Темна тема</button>
    </div>
    
    <div class="toolbar">
        <button class="btn btn-primary" id="btnAddRow" title="Додати Path (Enter)">+ Додати Path</button>
        <button class="btn btn-danger" id="btnClearTable" title="Очистити все">Очистити таблицю</button>
        <button class="btn btn-secondary" id="btnUndo" title="Скасувати (Ctrl+Z)">↶</button>
        <button class="btn btn-secondary" id="btnRedo" title="Повторити (Ctrl+Y)">↷</button>
        <span style="font-size: 11px; color: var(--text-muted); margin-left: auto;">Клавіші: [Enter] - додати, [Delete] - видалити виділені, [Esc] - зняти виділення, [Ctrl+A] - все</span>
        
        <div class="bulk-panel">
            <select id="bulkZoneSelect"></select>
            <button class="btn btn-primary" id="btnBulkApply" title="Застосувати зону до виділених">Застосувати (<span id="selectedCount">0</span>)</button>
        </div>
    </div>

    <div class="table-container">
        <table id="pathTable">
            <thead>
                <tr>
                    <th style="width: 3%"></th> <!-- Drag Handle -->
                    <th style="width: 4%"><input type="checkbox" id="selectAll"></th>
                    <th style="width: 20%">Назва <button class="copy-col-btn" data-col="path-name" title="Копіювати стовпець">📋</button></th>
                    <th style="width: 25%">Зона / Тип перерізу</th>
                    <th style="width: 13%">S<sub>1</sub> <button class="copy-col-btn" data-col="s1-val" title="Копіювати стовпець">📋</button></th>
                    <th style="width: 13%">S<sub>2</sub> <button class="copy-col-btn" data-col="s2-val" title="Копіювати стовпець">📋</button></th>
                    <th style="width: 13%">S<sub>rv</sub> <button class="copy-col-btn" data-col="srv-val" title="Копіювати стовпець">📋</button></th>
                    <th style="width: 9%">Дії</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Рядки рендеряться динамічно -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // Enum-style constants
    const ZONES = {
        NONE: '',
        FLANGE: 'flange',
        WELD_FLANGE_ELLIPTICAL: 'weld_flange_elliptical',
        WELD_FLANGE_SHELL: 'weld_flange_shell',
        FASTENERS: 'fasteners',
        SHELL: 'shell',
        FLAT_COVER: 'flat_cover',
        ELLIPTICAL_HEAD: 'elliptical_head',
        NOZZLE: 'nozzle',
        TUBESHEET: 'tubesheet'
    };

    // Яскраве колірне виділення категорій зон (заливка) - підвищена насиченість до 0.22
    const ZONE_COLORS = {
        [ZONES.NONE]: 'transparent',
        [ZONES.FLANGE]: '#3B82F6',             // Blue
        [ZONES.WELD_FLANGE_ELLIPTICAL]: '#10B981', // Emerald
        [ZONES.WELD_FLANGE_SHELL]: '#059669',      // Dark Emerald
        [ZONES.FASTENERS]: '#F59E0B',          // Amber
        [ZONES.SHELL]: '#8B5CF6',              // Violet
        [ZONES.FLAT_COVER]: '#EC4899',          // Pink
        [ZONES.ELLIPTICAL_HEAD]: '#06B6D4',     // Cyan
        [ZONES.NOZZLE]: '#EF4444',             // Red
        [ZONES.TUBESHEET]: '#14B8A6'           // Teal
    };

    const ZONE_BG_COLORS = {
        [ZONES.NONE]: 'transparent',
        [ZONES.FLANGE]: 'rgba(59, 130, 246, 0.22)',
        [ZONES.WELD_FLANGE_ELLIPTICAL]: 'rgba(16, 185, 129, 0.22)',
        [ZONES.WELD_FLANGE_SHELL]: 'rgba(5, 150, 105, 0.22)',
        [ZONES.FASTENERS]: 'rgba(245, 158, 11, 0.22)',
        [ZONES.SHELL]: 'rgba(139, 92, 246, 0.22)',
        [ZONES.FLAT_COVER]: 'rgba(236, 72, 153, 0.22)',
        [ZONES.ELLIPTICAL_HEAD]: 'rgba(6, 182, 212, 0.22)',
        [ZONES.NOZZLE]: 'rgba(239, 68, 68, 0.22)',
        [ZONES.TUBESHEET]: 'rgba(20, 184, 166, 0.22)'
    };

    // Спрощені підказки
    const T_SM = '<span class="tt" title="Membrane (Мембранні)">σ<sub>m</sub></span>';
    const T_SB = '<span class="tt" title="Bending (Згинні)">σ<sub>b</sub></span>';
    const T_ST = '<span class="tt" title="Thermal (Температурні)">σ<sub>T</sub></span>';

    const stressData = {
        [ZONES.NONE]: { name: "-- Оберіть зону --", s1: "-", s2: "-", srv: "-" },
        [ZONES.FLANGE]: { 
            name: "Фланець", 
            s1: `${T_SM}`, 
            s2: `${T_SM} + ${T_SB}`, 
            srv: `${T_SM} + ${T_SB} + ${T_ST}` 
        },
        [ZONES.WELD_FLANGE_ELLIPTICAL]: { 
            name: "Зона приварки фланця до еліптичного днища", 
            s1: "-", 
            s2: `${T_SM}`, 
            srv: `${T_SM} + ${T_SB} + ${T_ST}` 
        },
        [ZONES.WELD_FLANGE_SHELL]: { 
            name: "Зона приварки фланця до обичайки", 
            s1: "-", 
            s2: `${T_SM}`, 
            srv: `${T_SM} + ${T_SB} + ${T_ST}` 
        },
        [ZONES.FASTENERS]: { 
            name: "Болти/шпильки", 
            s1: `${T_SM}`, 
            s2: `${T_SM} + ${T_SB}`, 
            srv: `${T_SM} + ${T_SB} + ${T_ST}` 
        },
        [ZONES.SHELL]: { 
            name: "Обичайка", 
            s1: `${T_SM}`, 
            s2: "-", 
            srv: `${T_SM} + ${T_ST}` 
        },
        [ZONES.FLAT_COVER]: { 
            name: "Плоска кришка", 
            s1: "-", 
            s2: `${T_SB}`, 
            srv: `${T_SB} + ${T_ST}` 
        },
        [ZONES.ELLIPTICAL_HEAD]: { 
            name: "Еліптичне днище", 
            s1: `${T_SM}`, 
            s2: `${T_SM} + ${T_SB}`, 
            srv: `${T_SM} + ${T_SB} + ${T_ST}` 
        },
        [ZONES.NOZZLE]: { 
            name: "Зона патрубка", 
            s1: `${T_SM}`, 
            s2: `${T_SM} + ${T_SB}`, 
            srv: `${T_SB} + ${T_ST}` 
        },
        [ZONES.TUBESHEET]: { 
            name: "Трубна дошка", 
            s1: "-", 
            s2: `${T_SB}`, 
            srv: `${T_SM} + ${T_SB} + ${T_ST}` 
        }
    };

    const tableBody = document.getElementById('tableBody');
    const bulkZoneSelect = document.getElementById('bulkZoneSelect');
    const selectAllCheckbox = document.getElementById('selectAll');
    const selectedCountSpan = document.getElementById('selectedCount');
    
    let state = []; 
    let history = [];
    let historyIndex = -1;
    let pathCounter = 1;
    
    let isDraggingSelect = false;
    let startRowId = null;
    let draggedRowForReorder = null;

    // Стейт для Excel-style виділення клітинок
    let isSelectingCells = false;
    let startCell = null; // { row: idx, col: idx }

    // --- State Management ---
    function generateId() {
        return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
    }

    function syncStateFromDOM() {
        state = Array.from(tableBody.querySelectorAll('tr:not(.empty-state-row)')).map(tr => ({
            id: tr.dataset.id,
            name: tr.querySelector('.path-name').value,
            zone: tr.querySelector('.zone-select').value,
            selected: tr.classList.contains('selected-row')
        }));
    }

    function saveState(pushToHistory = true) {
        syncStateFromDOM();
        localStorage.setItem('ansys_paths_state', JSON.stringify(state));
        localStorage.setItem('ansys_paths_counter', pathCounter);
        
        if (pushToHistory) {
            if (historyIndex < history.length - 1) {
                history = history.slice(0, historyIndex + 1);
            }
            history.push(JSON.stringify(state));
            if (history.length > 50) history.shift();
            historyIndex = history.length - 1;
        }
        updateSelectedCount();
    }

    function loadState(stateStr, isInit = false) {
        if (!stateStr) return false;
        state = JSON.parse(stateStr);
        renderTable();
        if (isInit) {
            history = [stateStr];
            historyIndex = 0;
            const savedCounter = localStorage.getItem('ansys_paths_counter');
            if (savedCounter) pathCounter = parseInt(savedCounter, 10);
        }
        return true;
    }

    function undo() {
        if (historyIndex > 0) {
            historyIndex--;
            loadState(history[historyIndex]);
            syncStateFromDOM();
            localStorage.setItem('ansys_paths_state', JSON.stringify(state));
            showNotification("Скасовано");
        }
    }

    function redo() {
        if (historyIndex < history.length - 1) {
            historyIndex++;
            loadState(history[historyIndex]);
            syncStateFromDOM();
            localStorage.setItem('ansys_paths_state', JSON.stringify(state));
            showNotification("Повторено");
        }
    }

    // --- Rendering ---
    function renderTable() {
        tableBody.innerHTML = '';
        if (state.length === 0) {
            const tr = document.createElement('tr');
            tr.className = 'empty-state-row';
            tr.innerHTML = `
                <td colspan="8">
                    Таблиця порожня. Натисніть "+ Додати Path" або кнопку [Enter] для створення нового шляху.
                </td>
            `;
            tableBody.appendChild(tr);
            updateSelectedCount();
            return;
        }

        state.forEach(row => {
            const tr = createRowElement(row);
            tableBody.appendChild(tr);
        });
        updateSelectedCount();
    }

    function createRowElement(rowData) {
        const tr = document.createElement('tr');
        tr.dataset.id = rowData.id;
        tr.setAttribute('draggable', 'false');
        if (rowData.selected) tr.classList.add('selected-row');

        let optionsHtml = '';
        for (const [key, data] of Object.entries(stressData)) {
            const isSelected = rowData.zone === key ? 'selected' : '';
            optionsHtml += `<option value="${key}" ${isSelected}>${data.name}</option>`;
        }

        const stress = stressData[rowData.zone] || stressData[ZONES.NONE];
        const zoneColor = ZONE_COLORS[rowData.zone] || 'transparent';
        const zoneBg = ZONE_BG_COLORS[rowData.zone] || 'transparent';

        tr.innerHTML = `
            <td class="drag-handle" title="Затисніть для перетягування">☰</td>
            <td><input type="checkbox" class="row-select" ${rowData.selected ? 'checked' : ''}></td>
            <td><input type="text" class="path-name" value="${rowData.name}" placeholder="Назва шляху" style="border-left: 4px solid ${zoneColor}; background-color: ${zoneBg};"></td>
            <td>
                <select class="zone-select" style="border-left: 4px solid ${zoneColor}; background-color: ${zoneBg};">
                    ${optionsHtml}
                </select>
            </td>
            <td class="col-s s1-val">${stress.s1}</td>
            <td class="col-s s2-val">${stress.s2}</td>
            <td class="col-s srv-val">${stress.srv}</td>
            <td class="actions">
                <button class="action-btn dup-btn" data-action="duplicate" title="Дублювати row">⧉</button>
                <button class="action-btn remove-btn" data-action="remove" title="Видалити row">✖</button>
            </td>
        `;
        return tr;
    }

    function getNextPathName() {
        const name = `Path ${String.fromCharCode(64 + pathCounter)}`;
        pathCounter = pathCounter > 25 ? 1 : pathCounter + 1;
        return name;
    }

    // --- Custom Confirm Modal ---
    function showConfirm(message, onConfirm) {
        const modal = document.getElementById('confirmModal');
        document.getElementById('confirmMessage').textContent = message;
        modal.style.display = 'flex';
        
        const yesBtn = document.getElementById('confirmYesBtn');
        const noBtn = document.getElementById('confirmNoBtn');
        
        const cleanup = () => {
            modal.style.display = 'none';
            yesBtn.removeEventListener('click', handleYes);
            noBtn.removeEventListener('click', handleNo);
        };
        
        const handleYes = () => {
            cleanup();
            onConfirm();
        };
        
        const handleNo = () => {
            cleanup();
        };
        
        yesBtn.addEventListener('click', handleYes);
        noBtn.addEventListener('click', handleNo);
    }

    // --- Basic Operations ---
    document.getElementById('btnAddRow').addEventListener('click', () => {
        const emptyRow = tableBody.querySelector('.empty-state-row');
        if (emptyRow) emptyRow.remove();

        const newRow = { id: generateId(), name: getNextPathName(), zone: ZONES.NONE, selected: false };
        const tr = createRowElement(newRow);
        tableBody.appendChild(tr);
        saveState(true);
    });

    document.getElementById('btnClearTable').addEventListener('click', () => {
        showConfirm("Дійсно очистити таблицю?", () => {
            tableBody.innerHTML = '';
            pathCounter = 1;
            saveState(true);
            showNotification("Таблицю очищено!");
        });
    });

    document.getElementById('btnUndo').addEventListener('click', undo);
    document.getElementById('btnRedo').addEventListener('click', redo);

    // ESC, Delete, Enter, Ctrl+A Shortcuts
    document.addEventListener('keydown', e => {
        const activeEl = document.activeElement;
        const isInputFocused = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'SELECT');

        if (e.key === 'Escape') {
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach(tr => {
                tr.classList.remove('selected-row');
                const cb = tr.querySelector('.row-select');
                if (cb) cb.checked = false;
            });
            selectAllCheckbox.checked = false;
            updateSelectedCount();
            clearCellSelection(); // Зняття Excel-style виділення
            saveState(false);
            showNotification("Виділення знято");
            return;
        }

        if (e.key === 'Delete') {
            if (!isInputFocused) {
                const selectedRows = Array.from(tableBody.querySelectorAll('tr.selected-row'));
                if (selectedRows.length > 0) {
                    selectedRows.forEach(row => row.remove());
                    saveState(true);
                    showNotification(`Вилучено рядків: ${selectedRows.length}`);
                }
            }
            return;
        }

        if (e.key === 'Enter') {
            if (isInputFocused && activeEl.classList.contains('path-name')) {
                activeEl.blur();
            }
            if (activeEl.tagName !== 'SELECT' && activeEl.tagName !== 'BUTTON') {
                e.preventDefault();
                document.getElementById('btnAddRow').click();
                setTimeout(() => {
                    const lastRowInput = tableBody.querySelector('tr:last-child .path-name');
                    if (lastRowInput) {
                        lastRowInput.focus();
                        lastRowInput.select();
                    }
                }, 50);
            }
            return;
        }

        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'a') {
            if (!isInputFocused) {
                e.preventDefault();
                const rows = tableBody.querySelectorAll('tr:not(.empty-state-row)');
                rows.forEach(tr => {
                    tr.classList.add('selected-row');
                    const cb = tr.querySelector('.row-select');
                    if (cb) cb.checked = true;
                });
                saveState(false);
                updateSelectedCount();
                showNotification("Виділено всі рядки");
            }
            return;
        }

        if ((e.key === 'ArrowUp' || e.key === 'ArrowDown') && !isInputFocused) {
            e.preventDefault();
            const rows = Array.from(tableBody.querySelectorAll('tr:not(.empty-state-row)'));
            if (rows.length === 0) return;
            
            let activeIdx = rows.findIndex(tr => tr.classList.contains('selected-row'));
            if (activeIdx === -1) {
                const selectIdx = e.key === 'ArrowDown' ? 0 : rows.length - 1;
                rows[selectIdx].classList.add('selected-row');
                const cb = rows[selectIdx].querySelector('.row-select');
                if (cb) cb.checked = true;
                startRowId = rows[selectIdx].dataset.id;
            } else {
                rows.forEach(r => { r.classList.remove('selected-row'); const cb = r.querySelector('.row-select'); if(cb) cb.checked = false; });
                let nextIdx = e.key === 'ArrowDown' ? activeIdx + 1 : activeIdx - 1;
                if (nextIdx >= rows.length) nextIdx = rows.length - 1;
                if (nextIdx < 0) nextIdx = 0;
                rows[nextIdx].classList.add('selected-row');
                const cb = rows[nextIdx].querySelector('.row-select');
                if (cb) cb.checked = true;
                startRowId = rows[nextIdx].dataset.id;
            }
            saveState(false);
            updateSelectedCount();
        }

        if (e.ctrlKey || e.metaKey) {
            if (e.key.toLowerCase() === 'z') {
                e.preventDefault();
                if (e.shiftKey) redo(); else undo();
            } else if (e.key.toLowerCase() === 'y') {
                e.preventDefault();
                redo();
            }
        }
    });

    // --- Delegation on Table Body ---
    tableBody.addEventListener('click', e => {
        const btn = e.target.closest('button');
        if (btn) {
            const tr = btn.closest('tr');
            if (btn.dataset.action === 'remove') {
                tr.remove();
                saveState(true);
            } else if (btn.dataset.action === 'duplicate') {
                const trData = {
                    id: generateId(),
                    name: tr.querySelector('.path-name').value + ' (Copy)',
                    zone: tr.querySelector('.zone-select').value,
                    selected: false
                };
                const newTr = createRowElement(trData);
                tr.parentNode.insertBefore(newTr, tr.nextSibling);
                saveState(true);
            }
            return;
        }

        // Checkbox click
        if (e.target.classList.contains('row-select')) {
            const tr = e.target.closest('tr');
            if (e.target.checked) tr.classList.add('selected-row');
            else tr.classList.remove('selected-row');
            saveState(false);
            updateSelectedCount();
        }
    });

    tableBody.addEventListener('change', e => {
        if (e.target.classList.contains('zone-select')) {
            const tr = e.target.closest('tr');
            const data = stressData[e.target.value];
            tr.querySelector('.s1-val').innerHTML = data.s1;
            tr.querySelector('.s2-val').innerHTML = data.s2;
            tr.querySelector('.srv-val').innerHTML = data.srv;

            const zoneColor = ZONE_COLORS[e.target.value] || 'transparent';
            const zoneBg = ZONE_BG_COLORS[e.target.value] || 'transparent';

            // Динамічне розширене забарвлення випадаючого списку
            e.target.style.borderLeft = `4px solid ${zoneColor}`;
            e.target.style.backgroundColor = zoneBg;

            // Поширення кольорового маркування на назву перерізу
            const pathNameInput = tr.querySelector('.path-name');
            if (pathNameInput) {
                pathNameInput.style.borderLeft = `4px solid ${zoneColor}`;
                pathNameInput.style.backgroundColor = zoneBg;
            }
            saveState(true);
        } else if (e.target.classList.contains('path-name')) {
            saveState(true);
        }
    });
    
    // --- Excel-Style Cell Selection Logic ---
    function clearCellSelection() {
        tableBody.querySelectorAll('td.col-s.cell-selected').forEach(cell => {
            cell.classList.remove('cell-selected');
        });
    }

    function selectCellRange(cellA, cellB) {
        clearCellSelection();
        const minRow = Math.min(cellA.row, cellB.row);
        const maxRow = Math.max(cellA.row, cellB.row);
        const minCol = Math.min(cellA.col, cellB.col);
        const maxCol = Math.max(cellA.col, cellB.col);

        const trs = Array.from(tableBody.querySelectorAll('tr:not(.empty-state-row)'));
        for (let r = minRow; r <= maxRow; r++) {
            const tr = trs[r];
            if (!tr) continue;
            const cells = [
                tr.querySelector('.s1-val'),
                tr.querySelector('.s2-val'),
                tr.querySelector('.srv-val')
            ];
            for (let c = minCol; c <= maxCol; c++) {
                if (cells[c]) {
                    cells[c].classList.add('cell-selected');
                }
            }
        }
    }

    // --- Selection and D&D Handlers ---
    tableBody.addEventListener('mousedown', (e) => {
        const tr = e.target.closest('tr');
        if (!tr || tr.classList.contains('empty-state-row')) return;

        // Reordering trigger
        if (e.target.classList.contains('drag-handle')) {
            tr.setAttribute('draggable', 'true');
            return;
        }

        // БЛОК 1: Excel-style виділення розрахункових клітинок (S1, S2, Srv)
        const targetTd = e.target.closest('td.col-s');
        if (targetTd) {
            clearCellSelection();
            if (document.activeElement) document.activeElement.blur();

            isSelectingCells = true;
            document.body.classList.add('dragging-active');

            const trs = Array.from(tableBody.querySelectorAll('tr:not(.empty-state-row)'));
            const rIndex = trs.indexOf(tr);

            let cIndex = 0;
            if (targetTd.classList.contains('s2-val')) cIndex = 1;
            if (targetTd.classList.contains('srv-val')) cIndex = 2;

            startCell = { row: rIndex, col: cIndex };
            targetTd.classList.add('cell-selected');
            
            e.preventDefault();
            return; 
        }

        // Ігнорувати якщо клікаємо на інші інпути
        if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT' || e.target.closest('button') || e.target.tagName === 'OPTION') {
            return;
        }

        // БЛОК 2: Звичайне виділення рядків
        isDraggingSelect = true;
        document.body.classList.add('dragging-active');
        
        const rows = Array.from(tableBody.querySelectorAll('tr:not(.empty-state-row)'));
        
        if (e.shiftKey && startRowId) {
            const startRow = tableBody.querySelector(`tr[data-id="${startRowId}"]`);
            if(startRow) selectRange(startRow, tr);
        } else if (e.ctrlKey || e.metaKey) {
            tr.classList.toggle('selected-row');
            tr.querySelector('.row-select').checked = tr.classList.contains('selected-row');
            startRowId = tr.dataset.id;
        } else {
            rows.forEach(r => { r.classList.remove('selected-row'); r.querySelector('.row-select').checked = false; });
            tr.classList.add('selected-row');
            tr.querySelector('.row-select').checked = true;
            startRowId = tr.dataset.id;
        }
        updateSelectedCount();
    });

    tableBody.addEventListener('mouseover', (e) => {
        // Блок 1: Перетягування виділення клітинок
        if (isSelectingCells && startCell) {
            const targetTd = e.target.closest('td.col-s');
            if (!targetTd) return;

            const tr = targetTd.closest('tr');
            const trs = Array.from(tableBody.querySelectorAll('tr:not(.empty-state-row)'));
            const rIndex = trs.indexOf(tr);

            let cIndex = 0;
            if (targetTd.classList.contains('s2-val')) cIndex = 1;
            if (targetTd.classList.contains('srv-val')) cIndex = 2;

            selectCellRange(startCell, { row: rIndex, col: cIndex });
            return;
        }

        // Блок 2: Перетягування виділення рядків
        if (!isDraggingSelect || !startRowId) return;
        const tr = e.target.closest('tr');
        if (!tr || tr.classList.contains('empty-state-row')) return;
        if (e.target.classList.contains('col-s') || e.target.closest('.col-s')) return;
        const startRow = tableBody.querySelector(`tr[data-id="${startRowId}"]`);
        if (startRow) selectRange(startRow, tr);
        updateSelectedCount();
    });

    document.addEventListener('mouseup', () => {
        if (isDraggingSelect) {
            isDraggingSelect = false;
            document.body.classList.remove('dragging-active');
            saveState(false);
        }
        if (isSelectingCells) {
            isSelectingCells = false;
            document.body.classList.remove('dragging-active');
        }
        document.querySelectorAll('#tableBody tr').forEach(r => r.setAttribute('draggable', 'false'));
    });

    function selectRange(rowA, rowB) {
        const rows = Array.from(tableBody.querySelectorAll('tr:not(.empty-state-row)'));
        const indexA = rows.indexOf(rowA);
        const indexB = rows.indexOf(rowB);
        const start = Math.min(indexA, indexB);
        const end = Math.max(indexA, indexB);
        
        rows.forEach((row, idx) => {
            const isSel = (idx >= start && idx <= end);
            if(isSel) row.classList.add('selected-row');
            else row.classList.remove('selected-row');
            row.querySelector('.row-select').checked = isSel;
        });
    }

    // --- HTML5 Drag and Drop Reordering ---
    tableBody.addEventListener('dragstart', e => {
        if (e.target.tagName === 'TR') {
            draggedRowForReorder = e.target;
            e.dataTransfer.effectAllowed = 'move';
            if (e.dataTransfer.setData) e.dataTransfer.setData('text/plain', '');
            setTimeout(() => draggedRowForReorder.classList.add('dragging'), 0);
        }
    });

    tableBody.addEventListener('dragover', e => {
        e.preventDefault();
        if (!draggedRowForReorder) return;
        const tr = e.target.closest('tr');
        if (tr && tr !== draggedRowForReorder && tr.parentNode === tableBody && !tr.classList.contains('empty-state-row')) {
            const rect = tr.getBoundingClientRect();
            const relY = e.clientY - rect.top;
            
            Array.from(tableBody.children).forEach(r => {
                r.classList.remove('drag-over-top', 'drag-over-bottom');
            });

            if (relY < rect.height / 2) {
                tr.classList.add('drag-over-top');
            } else {
                tr.classList.add('drag-over-bottom');
            }
        }
    });

    tableBody.addEventListener('dragleave', e => {
        if (!draggedRowForReorder) return;
        const tr = e.target.closest('tr');
        if (tr) {
            tr.classList.remove('drag-over-top', 'drag-over-bottom');
        }
    });

    tableBody.addEventListener('drop', e => {
        e.preventDefault();
        if (!draggedRowForReorder) return;
        
        const tr = e.target.closest('tr');
        if (tr && tr !== draggedRowForReorder && tr.parentNode === tableBody && !tr.classList.contains('empty-state-row')) {
            const rect = tr.getBoundingClientRect();
            const relY = e.clientY - rect.top;
            
            if (relY < rect.height / 2) {
                tableBody.insertBefore(draggedRowForReorder, tr);
            } else {
                tableBody.insertBefore(draggedRowForReorder, tr.nextSibling);
            }
        }
    });

    tableBody.addEventListener('dragend', e => {
        if (draggedRowForReorder) {
            draggedRowForReorder.classList.remove('dragging');
            draggedRowForReorder.setAttribute('draggable', 'false');
            draggedRowForReorder = null;
        }
        Array.from(tableBody.children).forEach(r => {
            r.classList.remove('drag-over-top', 'drag-over-bottom');
        });
        saveState(true);
    });

    // --- Bulk Application & Copy Column ---
    selectAllCheckbox.addEventListener('change', function() {
        const rows = document.querySelectorAll('#tableBody tr:not(.empty-state-row)');
        rows.forEach(tr => {
            if (this.checked) tr.classList.add('selected-row');
            else tr.classList.remove('selected-row');
            tr.querySelector('.row-select').checked = this.checked;
        });
        saveState(false);
        updateSelectedCount();
    });

    document.getElementById('btnBulkApply').addEventListener('click', () => {
        const selectedZone = bulkZoneSelect.value;
        if (!selectedZone) {
            showNotification("Оберіть зону для застосування!", true);
            return;
        }
        
        const selectedRows = document.querySelectorAll('#tableBody tr.selected-row');
        if (selectedRows.length === 0) {
            showNotification("Виділіть рядки перед застосуванням!", true);
            return;
        }

        const zoneColor = ZONE_COLORS[selectedZone] || 'transparent';
        const zoneBg = ZONE_BG_COLORS[selectedZone] || 'transparent';
        
        selectedRows.forEach(tr => {
            const select = tr.querySelector('.zone-select');
            if (select) {
                select.value = selectedZone;
                select.style.borderLeft = `4px solid ${zoneColor}`;
                select.style.backgroundColor = zoneBg;
            }

            const pathNameInput = tr.querySelector('.path-name');
            if (pathNameInput) {
                pathNameInput.style.borderLeft = `4px solid ${zoneColor}`;
                pathNameInput.style.backgroundColor = zoneBg;
            }
            
            const data = stressData[selectedZone];
            tr.querySelector('.s1-val').innerHTML = data.s1;
            tr.querySelector('.s2-val').innerHTML = data.s2;
            tr.querySelector('.srv-val').innerHTML = data.srv;
        });
        
        saveState(true);
        showNotification(`Успішно оновлено рядків: ${selectedRows.length}`);
    });

    // Копіювання тексту в буфер
    function copyTextToClipboard(text, successMsg) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.top = "0";
        textArea.style.left = "0";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();

        try {
            const successful = document.execCommand('copy');
            if (successful) showNotification(successMsg);
            else showNotification("Помилка копіювання", true);
        } catch (err) {
            showNotification("Не підтримується пристроєм", true);
        }
        document.body.removeChild(textArea);
    }

    // Копіювання стовпців з табуляцією (чистий текст без HTML-тегів)
    document.querySelectorAll('.copy-col-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const colClass = btn.dataset.col;
            let textToCopy = "";

            if (colClass === 'path-name') {
                const elements = tableBody.querySelectorAll(`.${colClass}`);
                textToCopy = Array.from(elements).map(el => el.value).join('\n');
            } else {
                const elements = tableBody.querySelectorAll(`.${colClass}`);
                textToCopy = Array.from(elements).map(el => el.innerText.trim()).join('\n');
            }

            if (!textToCopy) {
                showNotification("Стовпець порожній", true);
                return;
            }
            copyTextToClipboard(textToCopy, "Стовпець скопійовано!");
        });
    });

    // Excel-style копіювання при події copy
    document.addEventListener('copy', (e) => {
        const selectedCells = Array.from(tableBody.querySelectorAll('td.col-s.cell-selected'));
        if (selectedCells.length === 0) return;

        const trs = Array.from(tableBody.querySelectorAll('tr:not(.empty-state-row)'));
        const rowMap = new Map();

        selectedCells.forEach(cell => {
            const tr = cell.closest('tr');
            const rIndex = trs.indexOf(tr);
            let cIndex = 0;
            if (cell.classList.contains('s2-val')) cIndex = 1;
            if (cell.classList.contains('srv-val')) cIndex = 2;

            if (!rowMap.has(rIndex)) {
                rowMap.set(rIndex, []);
            }
            rowMap.get(rIndex).push({ col: cIndex, text: cell.innerText.trim() });
        });

        const sortedRowIndices = Array.from(rowMap.keys()).sort((a, b) => a - b);
        const lines = sortedRowIndices.map(rIndex => {
            const cols = rowMap.get(rIndex).sort((a, b) => a.col - b.col);
            return cols.map(c => c.text).join('\t');
        });

        const clipboardText = lines.join('\n');
        e.clipboardData.setData('text/plain', clipboardText);
        e.preventDefault();
        showNotification("Скопійовано виділені клітинки!");
    });

    function updateSelectedCount() {
        const rows = document.querySelectorAll('#tableBody tr:not(.empty-state-row)');
        const selectedRows = document.querySelectorAll('#tableBody tr.selected-row');
        selectedCountSpan.textContent = selectedRows.length;
        if (rows.length > 0) {
            selectAllCheckbox.checked = (selectedRows.length === rows.length);
        } else {
            selectAllCheckbox.checked = false;
        }
    }

    // --- System / General ---
    function showNotification(message, isWarning = false) {
        const toast = document.getElementById('toastNotification');
        if (!toast) return;
        toast.textContent = message;
        toast.style.display = 'block';
        toast.style.opacity = '1';
        toast.style.borderLeftColor = isWarning ? '#E74C3C' : '#2ECC71';
        
        if (window.toastTimeout) clearTimeout(window.toastTimeout);
        if (window.toastHideTimeout) clearTimeout(window.toastHideTimeout);
        
        window.toastTimeout = setTimeout(() => {
            toast.style.opacity = '0';
            window.toastHideTimeout = setTimeout(() => {
                toast.style.display = 'none';
            }, 300);
        }, 2500);
    }

    const themeBtn = document.getElementById('themeBtn');
    themeBtn.addEventListener('click', () => {
        const html = document.documentElement;
        const newTheme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('ansys_paths_theme', newTheme);
        themeBtn.textContent = newTheme === 'light' ? '🌙 Темна тема' : '☀️ Світла тема';
    });

    function initTheme() {
        const savedTheme = localStorage.getItem('ansys_paths_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeBtn.textContent = savedTheme === 'light' ? '🌙 Темна тема' : '☀️ Світла тема';
    }

    function initBulkDropdown() {
        let optionsHtml = '<option value="">-- Оберіть зону --</option>';
        for (const [key, data] of Object.entries(stressData)) {
            if (key !== "") optionsHtml += `<option value="${key}">${data.name}</option>`;
        }
        bulkZoneSelect.innerHTML = optionsHtml;
    }

    window.onload = () => {
        initTheme();
        initBulkDropdown();
        
        const savedState = localStorage.getItem('ansys_paths_state');
        if (savedState && JSON.parse(savedState).length > 0) {
            loadState(savedState, true);
        } else {
            document.getElementById('btnAddRow').click();
            document.getElementById('btnAddRow').click();
            document.getElementById('btnAddRow').click();
        }
    };
</script>
